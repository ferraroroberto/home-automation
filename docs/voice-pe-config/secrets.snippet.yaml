# Add these keys to the HA VM's /config/secrets.yaml.
#
# REAL values live only on the build machine — never commit them (this repo is
# public). The values below are placeholders.

# The full Authorization header for this app's webapp. The token is the webapp's
# auth_token from config/webapp_config.json on the host (a 43-char string). Keep
# the literal "Bearer " prefix.
app_api_authorization: "Bearer <APP_WEBAPP_AUTH_TOKEN>"

# A short spoken code required to disarm by voice. Prefer ONE distinct word over
# digits — Whisper transcribes a word far more reliably than spaced digits. This
# is a voice gate layered on top of the RISCO panel PIN the app already holds
# server-side; it is NOT your panel PIN, and saying it never reveals the panel PIN.
voice_disarm_pin: "<your-spoken-disarm-code>"
