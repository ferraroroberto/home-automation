# >>> home-automation:voice-pe-alarm (managed — edit docs/voice-pe-config/configuration.snippet.yaml, deploy via scripts/ha_config_sync.py) >>>
#
# Voice PE deterministic alarm action bridge (issue #88, Phase 4).
#
# Deploy this block with `scripts/ha_config_sync.py deploy` (preferred), which
# replaces everything between these >>> / <<< markers and leaves the rest of
# configuration.yaml untouched. Hand-paste into /config/configuration.yaml is the
# fallback: replace the marked region (or the legacy "# --- Voice PE ..." section).
#
# Editing this section requires a FULL Home Assistant restart after
# `ha core check` (or Developer Tools -> YAML -> Check configuration) passes.
# Editing only custom_sentences/en/alarm.yaml does not; call conversation.reload.
rest_command:
  alarm_arm:
    url: "https://192.168.0.13:8447/api/security/arm"
    method: POST
    headers:
      authorization: !secret app_api_authorization
      x-automation-source: "voice-pe"
    verify_ssl: false
    timeout: 30
  alarm_partial:
    url: "https://192.168.0.13:8447/api/security/partial"
    method: POST
    headers:
      authorization: !secret app_api_authorization
      x-automation-source: "voice-pe"
    verify_ssl: false
    timeout: 30
  alarm_perimeter:
    url: "https://192.168.0.13:8447/api/security/perimeter"
    method: POST
    headers:
      authorization: !secret app_api_authorization
      x-automation-source: "voice-pe"
    verify_ssl: false
    timeout: 30
  alarm_disarm:
    url: "https://192.168.0.13:8447/api/security/disarm"
    method: POST
    headers:
      authorization: !secret app_api_authorization
      x-automation-source: "voice-pe"
    verify_ssl: false
    timeout: 30
  alarm_status:
    url: "https://192.168.0.13:8447/api/security"
    method: GET
    headers:
      authorization: !secret app_api_authorization
    verify_ssl: false
    timeout: 15
  # Family locator (issue #438) — read-only "where's mom/dad" query. {who} is
  # the spoken name/role; the app resolves it and returns a ready-made speech
  # string (found or not), same "app owns the spoken text" pattern as the wake
  # alarms/grocery commands below.
  presence_locate:
    url: "https://192.168.0.13:8447/api/presence/locate?who={{ who | urlencode }}&lang={{ lang | default('en') }}"
    method: GET
    headers:
      authorization: !secret app_api_authorization
    verify_ssl: false
    timeout: 15
  # ETA-home follow-up (issue #470) — the app resolves {who} to their live
  # location and returns a ready-made traffic-aware `speech` ("… about 18
  # minutes from home in current traffic"). Longer timeout: it makes a live
  # Google Directions call. Every failure mode is a spoken fallback, not a 500.
  presence_eta:
    url: "https://192.168.0.13:8447/api/presence/eta?who={{ who | urlencode }}&lang={{ lang | default('en') }}"
    method: GET
    headers:
      authorization: !secret app_api_authorization
    verify_ssl: false
    timeout: 20
  # Wake alarms (issue #306) — distinct from the RISCO alarm above. {when} is
  # the spoken time/schedule; the app parses it and returns a spoken reply.
  wake_alarm_set:
    url: "https://192.168.0.13:8447/api/wake-alarms/voice?lang={{ lang | default('en') }}"
    method: POST
    headers:
      authorization: !secret app_api_authorization
      content-type: "application/json"
    payload: '{"phrase": "{{ when }}"}'
    verify_ssl: false
    timeout: 30
  wake_alarm_cancel:
    url: "https://192.168.0.13:8447/api/wake-alarms/voice/cancel?lang={{ lang | default('en') }}"
    method: POST
    headers:
      authorization: !secret app_api_authorization
    verify_ssl: false
    timeout: 30
  wake_alarm_list:
    url: "https://192.168.0.13:8447/api/wake-alarms/voice?lang={{ lang | default('en') }}"
    method: GET
    headers:
      authorization: !secret app_api_authorization
    verify_ssl: false
    timeout: 15
  # Grocery list (issue #315) — the grocery-shopping-automation app on :8502
  # (grocery#86). One parameterized command: the app decides everything from
  # {intent, text}; `tojson` keeps free spoken text JSON-safe.
  grocery_voice:
    url: "https://192.168.0.13:8502/api/voice/command"
    method: POST
    headers:
      authorization: !secret grocery_api_authorization
      content-type: "application/json"
    payload: '{"intent": "{{ intent }}", "text": {{ text | default("") | tojson }}}'
    verify_ssl: false
    timeout: 30

intent_script:
  AlarmArmFull:
    action:
      - service: rest_command.alarm_arm
        response_variable: r
      - stop: "done"
        response_variable: r
    speech:
      text: >-
        {% set es = (lang | default('en')) == 'es' %}{% set esl = {'Disarmed':'desarmada','Armed':'armada','Partially armed':'parcialmente armada','Perimeter':'en modo perímetro','Partial':'en modo parcial','Arming':'armándose','Triggered':'disparada'} %}{% if action_response is defined and action_response.status == 200 %}{% set st = action_response.content %}{% if st.label != 'Disarmed' %}{% if es %}La alarma está ahora {{ esl.get(st.label, 'en un estado desconocido') }}.{% else %}The alarm is now {{ st.label }}.{% endif %}{% else %}{% set open = st.zones | selectattr('triggered') | rejectattr('bypassed') | map(attribute='display_name') | list %}{% if es %}La alarma no se armó{% if open %}; {{ open | join(', ') }} {{ 'está abierto' if open|length == 1 else 'están abiertos' }}{% endif %}.{% else %}The alarm did not arm{% if open %}; {{ open | join(', ') }} {{ 'is' if open|length == 1 else 'are' }} open{% endif %}.{% endif %}{% endif %}{% else %}{% if es %}Lo siento, la alarma no responde.{% else %}Sorry, the alarm did not respond.{% endif %}{% endif %}

  AlarmPerimeter:
    action:
      - service: rest_command.alarm_perimeter
        response_variable: r
      - stop: "done"
        response_variable: r
    speech:
      text: >-
        {% set es = (lang | default('en')) == 'es' %}{% set esl = {'Disarmed':'desarmada','Armed':'armada','Partially armed':'parcialmente armada','Perimeter':'en modo perímetro','Partial':'en modo parcial','Arming':'armándose','Triggered':'disparada'} %}{% if action_response is defined and action_response.status == 200 %}{% set st = action_response.content %}{% if st.label != 'Disarmed' %}{% if es %}La alarma está ahora {{ esl.get(st.label, 'en un estado desconocido') }}.{% else %}The alarm is now {{ st.label }}.{% endif %}{% else %}{% set open = st.zones | selectattr('triggered') | rejectattr('bypassed') | map(attribute='display_name') | list %}{% if es %}La alarma no se armó{% if open %}; {{ open | join(', ') }} {{ 'está abierto' if open|length == 1 else 'están abiertos' }}{% endif %}.{% else %}The alarm did not arm{% if open %}; {{ open | join(', ') }} {{ 'is' if open|length == 1 else 'are' }} open{% endif %}.{% endif %}{% endif %}{% else %}{% if es %}Lo siento, la alarma no responde.{% else %}Sorry, the alarm did not respond.{% endif %}{% endif %}

  AlarmPartial:
    action:
      - service: rest_command.alarm_partial
        response_variable: r
      - stop: "done"
        response_variable: r
    speech:
      text: >-
        {% set es = (lang | default('en')) == 'es' %}{% set esl = {'Disarmed':'desarmada','Armed':'armada','Partially armed':'parcialmente armada','Perimeter':'en modo perímetro','Partial':'en modo parcial','Arming':'armándose','Triggered':'disparada'} %}{% if action_response is defined and action_response.status == 200 %}{% set st = action_response.content %}{% if st.label != 'Disarmed' %}{% if es %}La alarma está ahora {{ esl.get(st.label, 'en un estado desconocido') }}.{% else %}The alarm is now {{ st.label }}.{% endif %}{% else %}{% set open = st.zones | selectattr('triggered') | rejectattr('bypassed') | map(attribute='display_name') | list %}{% if es %}La alarma no se armó{% if open %}; {{ open | join(', ') }} {{ 'está abierto' if open|length == 1 else 'están abiertos' }}{% endif %}.{% else %}The alarm did not arm{% if open %}; {{ open | join(', ') }} {{ 'is' if open|length == 1 else 'are' }} open{% endif %}.{% endif %}{% endif %}{% else %}{% if es %}Lo siento, la alarma no responde.{% else %}Sorry, the alarm did not respond.{% endif %}{% endif %}

  AlarmStatus:
    action:
      - service: rest_command.alarm_status
        response_variable: r
      - stop: "done"
        response_variable: r
    speech:
      text: >-
        {% set es = (lang | default('en')) == 'es' %}{% set esl = {'Disarmed':'desarmada','Armed':'armada','Partially armed':'parcialmente armada','Perimeter':'en modo perímetro','Partial':'en modo parcial','Arming':'armándose','Triggered':'disparada'} %}{% if action_response is defined and action_response.status == 200 %}{% if es %}La alarma está {{ esl.get(action_response.content.label, 'en un estado desconocido') }}.{% else %}The alarm is {{ action_response.content.label }}.{% endif %}{% else %}{% if es %}Lo siento, no puedo contactar con la alarma.{% else %}Sorry, I could not reach the alarm.{% endif %}{% endif %}

  AlarmDisarmWithCode:
    action:
      - variables:
          expected: !secret voice_disarm_pin
      - condition: template
        value_template: "{{ (code | string | lower | trim) == (expected | string | lower | trim) }}"
      - service: rest_command.alarm_disarm
        response_variable: r
      - stop: "done"
        response_variable: r
    speech:
      text: >-
        {% set es = (lang | default('en')) == 'es' %}{% set esl = {'Disarmed':'desarmada','Armed':'armada','Partially armed':'parcialmente armada','Perimeter':'en modo perímetro','Partial':'en modo parcial','Arming':'armándose','Triggered':'disparada'} %}{% if action_response is defined and action_response.status == 200 %}{% set st = action_response.content %}{% if st.label == 'Disarmed' %}{% if es %}La alarma está ahora desarmada.{% else %}The alarm is now Disarmed.{% endif %}{% else %}{% if es %}La alarma no se desarmó; sigue {{ esl.get(st.label, 'en un estado desconocido') }}.{% else %}The alarm did not disarm; it is still {{ st.label }}.{% endif %}{% endif %}{% else %}{% if es %}Ese código no es correcto, o la alarma no responde.{% else %}That code is not correct, or the alarm did not respond.{% endif %}{% endif %}

  AlarmDisarmPrompt:
    speech:
      text: >-
        {% if (lang | default('en')) == 'es' %}Para desarmar, di desarma seguido de tu código.{% else %}To disarm, say disarm followed by your code.{% endif %}

  # Family locator (issue #438) + ETA-home follow-up (issue #470).
  # The plain "where's mom/dad" relay used to live here as `intent_script.Locate`,
  # but an intent_script has no handle on the satellite that asked, so it cannot
  # ask a follow-up question. The locate match + the "how long to get home?"
  # follow-up now live together as the `presence_locator` conversation-trigger
  # automation at the end of this block (it has `trigger.device_id`, so it can
  # call assist_satellite.ask_question). The custom_sentences/{en,es}/locate.yaml
  # intents are intentionally emptied to hand the "where's X" match to that
  # automation without double-matching.

  # Wake alarms (issue #306). The app parses the spoken time and returns a
  # ready-made `speech` string, so these templates just relay it.
  WakeAlarmSet:
    action:
      - service: rest_command.wake_alarm_set
        data:
          when: "{{ when }}"
          lang: "{{ lang | default('en') }}"
        response_variable: r
      - stop: "done"
        response_variable: r
    speech:
      text: >-
        {% if action_response is defined and action_response.status == 200 %}{{ action_response.content.speech }}{% elif (lang | default('en')) == 'es' %}Lo siento, no he podido crear esa alarma.{% else %}Sorry, I couldn't set that wake alarm.{% endif %}

  WakeAlarmCancel:
    action:
      - service: rest_command.wake_alarm_cancel
        data:
          lang: "{{ lang | default('en') }}"
        response_variable: r
      - stop: "done"
        response_variable: r
    speech:
      text: >-
        {% if action_response is defined and action_response.status == 200 %}{{ action_response.content.speech }}{% elif (lang | default('en')) == 'es' %}Lo siento, no he podido cancelar tu alarma.{% else %}Sorry, I couldn't cancel your wake alarm.{% endif %}

  WakeAlarmList:
    action:
      - service: rest_command.wake_alarm_list
        data:
          lang: "{{ lang | default('en') }}"
        response_variable: r
      - stop: "done"
        response_variable: r
    speech:
      text: >-
        {% if action_response is defined and action_response.status == 200 %}{{ action_response.content.speech }}{% elif (lang | default('en')) == 'es' %}Lo siento, no puedo consultar tus alarmas.{% else %}Sorry, I couldn't reach your wake alarms.{% endif %}

  # Grocery list (issue #315) — SPANISH-ONLY flows on the "Asistente (es)"
  # pipeline (wake word "Hey Mycroft"): es-hinted STT, es_ES Piper voice,
  # deterministic built-in agent. The app parses the free Spanish fragment
  # and returns a ready-made Spanish `speech` string; these just relay it.
  GroceryAdd:
    action:
      - service: rest_command.grocery_voice
        data:
          intent: add
          text: "{{ details }}"
        response_variable: r
      - stop: "done"
        response_variable: r
    speech:
      text: >-
        {% if action_response is defined and action_response.status == 200 %}{{ action_response.content.speech }}{% else %}Lo siento, no puedo conectar con la lista.{% endif %}

  GroceryTarget:
    action:
      - service: rest_command.grocery_voice
        data:
          intent: target
          text: "{{ details }}"
        response_variable: r
      - stop: "done"
        response_variable: r
    speech:
      text: >-
        {% if action_response is defined and action_response.status == 200 %}{{ action_response.content.speech }}{% else %}Lo siento, no puedo conectar con la lista.{% endif %}

  GroceryStock:
    action:
      - service: rest_command.grocery_voice
        data:
          intent: stock
          text: "{{ details }}"
        response_variable: r
      - stop: "done"
        response_variable: r
    speech:
      text: >-
        {% if action_response is defined and action_response.status == 200 %}{{ action_response.content.speech }}{% else %}Lo siento, no puedo conectar con la lista.{% endif %}

  # "no quedan huevos" — the sentence consumed the zero cue, so re-prefix it
  # before the app parses (zero-phrase → stock 0, grocery#89).
  GroceryOut:
    action:
      - service: rest_command.grocery_voice
        data:
          intent: stock
          text: "no quedan {{ details }}"
        response_variable: r
      - stop: "done"
        response_variable: r
    speech:
      text: >-
        {% if action_response is defined and action_response.status == 200 %}{{ action_response.content.speech }}{% else %}Lo siento, no puedo conectar con la lista.{% endif %}

  GroceryQuery:
    action:
      - service: rest_command.grocery_voice
        data:
          intent: query
        response_variable: r
      - stop: "done"
        response_variable: r
    speech:
      text: >-
        {% if action_response is defined and action_response.status == 200 %}{{ action_response.content.speech }}{% else %}Lo siento, no puedo conectar con la lista.{% endif %}

  # Spoken menu (the voice cheat sheet, #437's twin). Static — no rest call.
  GroceryHelp:
    speech:
      text: >-
        Puedes decir: añade leche y dos huevos. Pon el objetivo de leche a cuatro. Anota que tenemos dos aceites. No quedan huevos. Qué hay que comprar. O di: quiero añadir cosas a la lista, y te preguntaré qué quieres.

# Multi-turn grocery add (issue #315): the trigger phrase opens a follow-up
# question on the same puck (assist_satellite.ask_question, HA 2025.7+), the
# free Spanish answer is captured by a bare wildcard and relayed to the app,
# and the app's Spanish reply is announced back. A labeled `automation`
# instance — merges with the UI-managed `automation: !include automations.yaml`.
automation grocery_voice:
  - id: grocery_voice_add_multiturn
    alias: "Grocery: add items by voice (multi-turn, es)"
    mode: single
    triggers:
      - trigger: conversation
        command:
          - "quiero añadir [(cosas|algo)] a la lista [de la compra]"
          - "añadir [(cosas|algo)] a la lista [de la compra]"
    actions:
      # Silence the triggering turn — the question below is the reply.
      - set_conversation_response: ""
      - variables:
          satellite: >-
            {% set from_device = device_entities(trigger.device_id) | select('search', '^assist_satellite\.') | list if trigger.device_id else [] %}
            {{ from_device | first if from_device else states.assist_satellite | map(attribute='entity_id') | list | first }}
      - action: assist_satellite.ask_question
        data:
          entity_id: "{{ satellite }}"
          question: "¿Qué quieres añadir?"
          answers:
            - id: items
              sentences:
                - "{items}"
        response_variable: answer
      - action: rest_command.grocery_voice
        data:
          intent: add
          text: "{{ answer.slots.items if answer is defined and answer.slots is defined else '' }}"
        response_variable: r
      - action: assist_satellite.announce
        data:
          entity_id: "{{ satellite }}"
          message: >-
            {% if r is defined and r.status == 200 %}{{ r.content.speech }}{% else %}Lo siento, la lista no responde.{% endif %}

# Family locator + ETA-home follow-up (issues #438, #446, #470). A conversation
# trigger (not an intent_script) so the same turn can ask a follow-up question:
# it needs `trigger.device_id` to resolve the satellite for
# assist_satellite.ask_question. One automation, two triggers keyed by `id`
# (en/es) so the app is called with the right `lang` and the puck speaks the
# pipeline's own language. This replaces intent_script.Locate; the
# custom_sentences/{en,es}/locate.yaml intents are emptied so only this matches.
# Works on both pipelines: "Prefer handling commands locally" runs the built-in
# sentence matcher (which owns conversation triggers) before any LLM agent, the
# same path the old custom-sentence Locate intent relied on.
automation presence_locator:
  - id: presence_locator_with_eta
    alias: "Presence: where is X + ETA-home follow-up (en/es)"
    mode: single
    triggers:
      - trigger: conversation
        id: en
        command:
          - "(where's|where is|wheres) {who}"
          - "(where's|where is|wheres) my {who}"
          - "(what's|what is|whats) {who}[']s location"
          - "locate {who}"
          - "find {who}"
      - trigger: conversation
        id: es
        command:
          - "(dónde|donde) (está|esta) [mi] {who}"
          - "(dónde|donde) anda {who}"
          - "localiza [a] {who}"
          - "encuentra [a] {who}"
    actions:
      # Silence the triggering turn — the announcements below are the reply.
      - set_conversation_response: ""
      - variables:
          lang: "{{ 'es' if trigger.id == 'es' else 'en' }}"
          who: "{{ trigger.slots.who | default('') }}"
          satellite: >-
            {% set from_device = device_entities(trigger.device_id) | select('search', '^assist_satellite\.') | list if trigger.device_id else [] %}
            {{ from_device | first if from_device else states.assist_satellite | map(attribute='entity_id') | list | first }}
      # 1) Speak where they are (the classic locator answer).
      - action: rest_command.presence_locate
        data:
          who: "{{ who }}"
          lang: "{{ lang }}"
        response_variable: loc
      - action: assist_satellite.announce
        data:
          entity_id: "{{ satellite }}"
          message: >-
            {% if loc is defined and loc.status == 200 %}{{ loc.content.speech }}{% elif lang == 'es' %}No puedo contactar con el localizador.{% else %}Sorry, I couldn't reach the locator.{% endif %}
      # 2) Only offer the ETA when they were found and are NOT already home.
      #    `place` is the canonical label ("Home" in both languages); a false
      #    condition stops the sequence here (mode: single), so a home/unknown
      #    answer just ends after the locate reply.
      - condition: template
        value_template: "{{ loc is defined and loc.status == 200 and loc.content.found and loc.content.place != 'Home' }}"
      - action: assist_satellite.ask_question
        data:
          entity_id: "{{ satellite }}"
          question: >-
            {% if lang == 'es' %}¿Quieres saber cuánto tardará en llegar a casa?{% else %}Do you want to know how long it'll take to get home?{% endif %}
          answers:
            - id: "yes"
              sentences:
                - "(yes|yeah|yep|sure|please|go on|ok|okay)"
                - "(sí|si|vale|claro|venga|por favor)"
            - id: "no"
              sentences:
                - "(no|nope|no thanks|that's all)"
                - "(no|no gracias|nada más|déjalo)"
        response_variable: answer
      # 3) On "yes" (an unrecognised answer leaves `answer.id` unset → stop),
      #    speak the traffic-aware ETA the app computed.
      - condition: template
        value_template: "{{ answer is defined and answer.id == 'yes' }}"
      - action: rest_command.presence_eta
        data:
          who: "{{ who }}"
          lang: "{{ lang }}"
        response_variable: eta
      - action: assist_satellite.announce
        data:
          entity_id: "{{ satellite }}"
          message: >-
            {% if eta is defined and eta.status == 200 %}{{ eta.content.speech }}{% elif lang == 'es' %}No puedo calcular el trayecto ahora mismo.{% else %}I can't work out the trip right now.{% endif %}
