# >>> home-automation:voice-pe-alarm (managed — edit docs/voice-pe-config/configuration.snippet.yaml, deploy via scripts/ha_config_sync.py) >>>
#
# Voice PE deterministic alarm action bridge (issue #88, Phase 4).
#
# Deploy this block with `scripts/ha_config_sync.py deploy` (preferred), which
# replaces everything between these >>> / <<< markers and leaves the rest of
# configuration.yaml untouched. Hand-paste into /config/configuration.yaml is the
# fallback: replace the marked region (or the legacy "# --- Voice PE ..." section).
#
# Editing this section requires a FULL Home Assistant restart after
# `ha core check` (or Developer Tools -> YAML -> Check configuration) passes.
# Editing only custom_sentences/en/alarm.yaml does not; call conversation.reload.
rest_command:
  alarm_arm:
    url: "https://192.168.0.13:8447/api/security/arm"
    method: POST
    headers:
      authorization: !secret app_api_authorization
      x-automation-source: "voice-pe"
    verify_ssl: false
    timeout: 30
  alarm_partial:
    url: "https://192.168.0.13:8447/api/security/partial"
    method: POST
    headers:
      authorization: !secret app_api_authorization
      x-automation-source: "voice-pe"
    verify_ssl: false
    timeout: 30
  alarm_perimeter:
    url: "https://192.168.0.13:8447/api/security/perimeter"
    method: POST
    headers:
      authorization: !secret app_api_authorization
      x-automation-source: "voice-pe"
    verify_ssl: false
    timeout: 30
  alarm_disarm:
    url: "https://192.168.0.13:8447/api/security/disarm"
    method: POST
    headers:
      authorization: !secret app_api_authorization
      x-automation-source: "voice-pe"
    verify_ssl: false
    timeout: 30
  alarm_status:
    url: "https://192.168.0.13:8447/api/security"
    method: GET
    headers:
      authorization: !secret app_api_authorization
    verify_ssl: false
    timeout: 15
  # Wake alarms (issue #306) — distinct from the RISCO alarm above. {when} is
  # the spoken time/schedule; the app parses it and returns a spoken reply.
  wake_alarm_set:
    url: "https://192.168.0.13:8447/api/wake-alarms/voice"
    method: POST
    headers:
      authorization: !secret app_api_authorization
      content-type: "application/json"
    payload: '{"phrase": "{{ when }}"}'
    verify_ssl: false
    timeout: 30
  wake_alarm_cancel:
    url: "https://192.168.0.13:8447/api/wake-alarms/voice/cancel"
    method: POST
    headers:
      authorization: !secret app_api_authorization
    verify_ssl: false
    timeout: 30
  wake_alarm_list:
    url: "https://192.168.0.13:8447/api/wake-alarms/voice"
    method: GET
    headers:
      authorization: !secret app_api_authorization
    verify_ssl: false
    timeout: 15
  # Grocery list (issue #315) — the grocery-shopping-automation app on :8502
  # (grocery#86). One parameterized command: the app decides everything from
  # {intent, text}; `tojson` keeps free spoken text JSON-safe.
  grocery_voice:
    url: "https://192.168.0.13:8502/api/voice/command"
    method: POST
    headers:
      authorization: !secret grocery_api_authorization
      content-type: "application/json"
    payload: '{"intent": "{{ intent }}", "text": {{ text | default("") | tojson }}}'
    verify_ssl: false
    timeout: 30

intent_script:
  AlarmArmFull:
    action:
      - service: rest_command.alarm_arm
        response_variable: r
      - stop: "done"
        response_variable: r
    speech:
      text: >-
        {% if action_response is defined and action_response.status == 200 %}{% set st = action_response.content %}{% if st.label != 'Disarmed' %}The alarm is now {{ st.label }}.{% else %}{% set open = st.zones | selectattr('triggered') | rejectattr('bypassed') | map(attribute='display_name') | list %}The alarm did not arm{% if open %}; {{ open | join(', ') }} {{ 'is' if open|length == 1 else 'are' }} open{% endif %}.{% endif %}{% else %}Sorry, the alarm did not respond.{% endif %}

  AlarmPerimeter:
    action:
      - service: rest_command.alarm_perimeter
        response_variable: r
      - stop: "done"
        response_variable: r
    speech:
      text: >-
        {% if action_response is defined and action_response.status == 200 %}{% set st = action_response.content %}{% if st.label != 'Disarmed' %}The alarm is now {{ st.label }}.{% else %}{% set open = st.zones | selectattr('triggered') | rejectattr('bypassed') | map(attribute='display_name') | list %}The alarm did not arm{% if open %}; {{ open | join(', ') }} {{ 'is' if open|length == 1 else 'are' }} open{% endif %}.{% endif %}{% else %}Sorry, the alarm did not respond.{% endif %}

  AlarmPartial:
    action:
      - service: rest_command.alarm_partial
        response_variable: r
      - stop: "done"
        response_variable: r
    speech:
      text: >-
        {% if action_response is defined and action_response.status == 200 %}{% set st = action_response.content %}{% if st.label != 'Disarmed' %}The alarm is now {{ st.label }}.{% else %}{% set open = st.zones | selectattr('triggered') | rejectattr('bypassed') | map(attribute='display_name') | list %}The alarm did not arm{% if open %}; {{ open | join(', ') }} {{ 'is' if open|length == 1 else 'are' }} open{% endif %}.{% endif %}{% else %}Sorry, the alarm did not respond.{% endif %}

  AlarmStatus:
    action:
      - service: rest_command.alarm_status
        response_variable: r
      - stop: "done"
        response_variable: r
    speech:
      text: >-
        {% if action_response is defined and action_response.status == 200 %}The alarm is {{ action_response.content.label }}.{% else %}Sorry, I could not reach the alarm.{% endif %}

  AlarmDisarmWithCode:
    action:
      - variables:
          expected: !secret voice_disarm_pin
      - condition: template
        value_template: "{{ (code | string | lower | trim) == (expected | string | lower | trim) }}"
      - service: rest_command.alarm_disarm
        response_variable: r
      - stop: "done"
        response_variable: r
    speech:
      text: >-
        {% if action_response is defined and action_response.status == 200 %}{% set st = action_response.content %}{% if st.label == 'Disarmed' %}The alarm is now Disarmed.{% else %}The alarm did not disarm; it is still {{ st.label }}.{% endif %}{% else %}That code is not correct, or the alarm did not respond.{% endif %}

  AlarmDisarmPrompt:
    speech:
      text: "To disarm, say disarm followed by your code."

  # Wake alarms (issue #306). The app parses the spoken time and returns a
  # ready-made `speech` string, so these templates just relay it.
  WakeAlarmSet:
    action:
      - service: rest_command.wake_alarm_set
        data:
          when: "{{ when }}"
        response_variable: r
      - stop: "done"
        response_variable: r
    speech:
      text: >-
        {% if action_response is defined and action_response.status == 200 %}{{ action_response.content.speech }}{% else %}Sorry, I couldn't set that wake alarm.{% endif %}

  WakeAlarmCancel:
    action:
      - service: rest_command.wake_alarm_cancel
        response_variable: r
      - stop: "done"
        response_variable: r
    speech:
      text: >-
        {% if action_response is defined and action_response.status == 200 %}{{ action_response.content.speech }}{% else %}Sorry, I couldn't cancel your wake alarm.{% endif %}

  WakeAlarmList:
    action:
      - service: rest_command.wake_alarm_list
        response_variable: r
      - stop: "done"
        response_variable: r
    speech:
      text: >-
        {% if action_response is defined and action_response.status == 200 %}{{ action_response.content.speech }}{% else %}Sorry, I couldn't reach your wake alarms.{% endif %}

  # Grocery list (issue #315) — SPANISH-ONLY flows on the "Asistente (es)"
  # pipeline (wake word "Hey Jarvis"): es-hinted STT, es_ES Piper voice,
  # deterministic built-in agent. The app parses the free Spanish fragment
  # and returns a ready-made Spanish `speech` string; these just relay it.
  GroceryAdd:
    action:
      - service: rest_command.grocery_voice
        data:
          intent: add
          text: "{{ details }}"
        response_variable: r
      - stop: "done"
        response_variable: r
    speech:
      text: >-
        {% if action_response is defined and action_response.status == 200 %}{{ action_response.content.speech }}{% else %}Lo siento, no puedo conectar con la lista.{% endif %}

  GroceryTarget:
    action:
      - service: rest_command.grocery_voice
        data:
          intent: target
          text: "{{ details }}"
        response_variable: r
      - stop: "done"
        response_variable: r
    speech:
      text: >-
        {% if action_response is defined and action_response.status == 200 %}{{ action_response.content.speech }}{% else %}Lo siento, no puedo conectar con la lista.{% endif %}

  GroceryStock:
    action:
      - service: rest_command.grocery_voice
        data:
          intent: stock
          text: "{{ details }}"
        response_variable: r
      - stop: "done"
        response_variable: r
    speech:
      text: >-
        {% if action_response is defined and action_response.status == 200 %}{{ action_response.content.speech }}{% else %}Lo siento, no puedo conectar con la lista.{% endif %}

  # "no quedan huevos" — the sentence consumed the zero cue, so re-prefix it
  # before the app parses (zero-phrase → stock 0, grocery#89).
  GroceryOut:
    action:
      - service: rest_command.grocery_voice
        data:
          intent: stock
          text: "no quedan {{ details }}"
        response_variable: r
      - stop: "done"
        response_variable: r
    speech:
      text: >-
        {% if action_response is defined and action_response.status == 200 %}{{ action_response.content.speech }}{% else %}Lo siento, no puedo conectar con la lista.{% endif %}

  GroceryQuery:
    action:
      - service: rest_command.grocery_voice
        data:
          intent: query
        response_variable: r
      - stop: "done"
        response_variable: r
    speech:
      text: >-
        {% if action_response is defined and action_response.status == 200 %}{{ action_response.content.speech }}{% else %}Lo siento, no puedo conectar con la lista.{% endif %}

  # Spoken menu (the voice cheat sheet, #437's twin). Static — no rest call.
  GroceryHelp:
    speech:
      text: >-
        Puedes decir: añade leche y dos huevos. Pon el objetivo de leche a cuatro. Anota que tenemos dos aceites. No quedan huevos. Qué hay que comprar. O di: quiero añadir cosas a la lista, y te preguntaré qué quieres.

# Multi-turn grocery add (issue #315): the trigger phrase opens a follow-up
# question on the same puck (assist_satellite.ask_question, HA 2025.7+), the
# free Spanish answer is captured by a bare wildcard and relayed to the app,
# and the app's Spanish reply is announced back. A labeled `automation`
# instance — merges with the UI-managed `automation: !include automations.yaml`.
automation grocery_voice:
  - id: grocery_voice_add_multiturn
    alias: "Grocery: add items by voice (multi-turn, es)"
    mode: single
    triggers:
      - trigger: conversation
        command:
          - "quiero añadir [(cosas|algo)] a la lista [de la compra]"
          - "añadir [(cosas|algo)] a la lista [de la compra]"
    actions:
      # Silence the triggering turn — the question below is the reply.
      - set_conversation_response: ""
      - variables:
          satellite: >-
            {% set from_device = device_entities(trigger.device_id) | select('search', '^assist_satellite\.') | list if trigger.device_id else [] %}
            {{ from_device | first if from_device else states.assist_satellite | map(attribute='entity_id') | list | first }}
      - action: assist_satellite.ask_question
        data:
          entity_id: "{{ satellite }}"
          question: "¿Qué quieres añadir?"
          answers:
            - id: items
              sentences:
                - "{items}"
        response_variable: answer
      - action: rest_command.grocery_voice
        data:
          intent: add
          text: "{{ answer.slots.items if answer is defined and answer.slots is defined else '' }}"
        response_variable: r
      - action: assist_satellite.announce
        data:
          entity_id: "{{ satellite }}"
          message: >-
            {% if r is defined and r.status == 200 %}{{ r.content.speech }}{% else %}Lo siento, la lista no responde.{% endif %}
# <<< home-automation:voice-pe-alarm <<<
