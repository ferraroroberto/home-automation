# Home Assistant custom sentences — grocery-list voice commands (issue #315).
#
# Install at the HA VM path: /config/custom_sentences/en/grocery.yaml
#
# One-shot commands against the grocery-shopping-automation app on :8502
# (grocery#86): the wildcard captures the free Spanish fragment and the app's
# /api/voice/command parses it server-side (hub LLM) — the sentences stay thin,
# exactly like wake_alarm.yaml's {when}. Spanish trigger phrasings are listed
# here too: hassil matches the *transcribed text*, whatever language the words
# are — the en/ folder only has to match the pipeline's configured language.
#
# The multi-turn "I want to add stuff to the list" flow is NOT here — it is a
# conversation-triggered automation with assist_satellite.ask_question (see
# configuration.snippet.yaml), because an intent_script cannot hold a
# follow-up question open.
language: "en"

# {details} is a free-text wildcard: the item fragment, usually Spanish
# ("leche a cuatro", "dos botellas de aceite") — parsed by the app, not here.
lists:
  details:
    wildcard: true

intents:
  # Set an item's target quantity ("pon el objetivo de leche a cuatro").
  GroceryTarget:
    data:
      - sentences:
          - "(set|change) [the] [grocery] target (for|of) {details}"
          - "pon el objetivo de {details}"
          - "cambia el objetivo de {details}"
          - "objetivo de {details}"

  # Record current stock ("tenemos dos botellas de aceite").
  GroceryStock:
    data:
      - sentences:
          - "update [the] [grocery] stock {details}"
          - "(anota|apunta) que tenemos {details}"
          - "tenemos {details}"
          - "no (queda|quedan) {details}"

  # Read back what's currently on the shopping list.
  GroceryQuery:
    data:
      - sentences:
          - "(what's|what is) on the (shopping|grocery) list"
          - "(read|list) [me] the (shopping|grocery) list"
          - "que hay en la lista [de la compra]"
          - "lee la lista [de la compra]"
          - "que hay que comprar"
